<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТвойМаяк 🌊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --glass-hover: rgba(255,255,255,0.1);
    --accent: #6c8ef7;
    --accent2: #9b7bea;
    --text: #e8eaf6;
    --muted: rgba(232,234,246,0.5);
    --error: #ff6b6b;
    --success: #6bffb8;
    --wave: #4a7bef;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background */
  .bg-orbs {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: drift 12s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #4a7bef, transparent); top: -150px; left: -150px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #9b7bea, transparent); bottom: -100px; right: -100px; animation-delay: -4s; }
  .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #6bffb8, transparent); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; opacity: 0.1; }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
  }

  /* Grid noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    margin: 20px;
    padding: 48px 40px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 32px 80px rgba(0,0,0,0.4),
      0 0 120px rgba(74,123,239,0.08);
    animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, rgba(74,123,239,0.3), rgba(155,123,234,0.3));
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 32px rgba(74,123,239,0.2), 0 0 0 1px rgba(255,255,255,0.06) inset;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e8eaf6, #9b7bea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 400;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
  }

  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 4px 16px rgba(108,142,247,0.3);
  }

  /* Fields */
  .field-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    transition: all 0.2s;
    outline: none;
    backdrop-filter: blur(10px);
  }

  input::placeholder { color: rgba(232,234,246,0.3); }

  input:focus {
    border-color: var(--accent);
    background: rgba(108,142,247,0.08);
    box-shadow: 0 0 0 3px rgba(108,142,247,0.15);
  }

  /* Button */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 16px;
    color: white;
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
    box-shadow: 0 8px 32px rgba(108,142,247,0.3);
    letter-spacing: 0.01em;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(108,142,247,0.4);
  }

  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Error */
  .error-msg {
    background: rgba(255,107,107,0.12);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 16px;
    display: none;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Loading spinner in button */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🌊</div>
    <h1>ТвойМаяк</h1>
    <p class="subtitle">Твой личный дневник с ИИ — освещай каждый день</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
    <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <div id="login-form">
    <div class="field-group">
      <label>Имя пользователя</label>
      <input type="text" id="login-username" placeholder="Введи имя..." autocomplete="username">
    </div>
    <div class="field-group">
      <label>Пароль</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Войти</button>
  </div>

  <div id="register-form" style="display:none;">
    <div class="field-group">
      <label>Имя пользователя</label>
      <input type="text" id="reg-username" placeholder="Придумай имя..." autocomplete="username">
    </div>
    <div class="field-group">
      <label>Пароль</label>
      <input type="password" id="reg-password" placeholder="Минимум 6 символов" autocomplete="new-password">
    </div>
    <button class="btn-primary" id="reg-btn" onclick="doRegister()">Создать аккаунт</button>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'?i===0:i===1)));
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Загрузка...';
  } else {
    btn.disabled = false;
    btn.innerHTML = btnId === 'login-btn' ? 'Войти' : 'Создать аккаунт';
  }
}

async function doLogin() {
  hideError();
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return showError('Заполни все поля');
  setLoading('login-btn', true);
  try {
    const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const d = await r.json();
    if (d.error) showError(d.error);
    else location.reload();
  } finally { setLoading('login-btn', false); }
}

async function doRegister() {
  hideError();
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !password) return showError('Заполни все поля');
  setLoading('reg-btn', true);
  try {
    const r = await fetch('/api/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const d = await r.json();
    if (d.error) showError(d.error);
    else location.reload();
  } finally { setLoading('reg-btn', false); }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('login-form').style.display !== 'none';
  if (loginVisible) doLogin(); else doRegister();
});
</script>
</body>
</html>
